apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: us-central1-docker.pkg.dev/caremykids-prod/caremykids/frontend:latest
          ports:
            - containerPort: 8501
          env:
            - name: EXAMPLE_SERVER_PORT
              value: http://backend:8000
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: caremykids-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: caremykids-secrets
                  key: ANTHROPIC_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8501
